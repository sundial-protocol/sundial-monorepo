name: Security

on:
  pull_request:
    branches:
      - main
    paths:
      - demo/**
      - .github/actions/setup-demo/**
      - .github/workflows/security.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup demo workspace
        uses: ./.github/actions/setup-demo

      - name: Run security audit
        run: pnpm run security:audit:all
        working-directory: demo
