name: Security

on:
  pull_request:
    branches:
      - main
    paths:
      - demo/**
      - .github/actions/setup-l2/**
      - .github/workflows/security.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_REPORT_PATH: temp/gitleaks-report.json
  TRIVY_VERSION: 0.70.0

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup l2 workspace
        uses: ./.github/actions/setup-l2

      - name: Run security audit
        run: pnpm run security:audit:all
        working-directory: demo

  trivy:
    name: Trivy
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Trivy
        run: |
          mkdir -p "$RUNNER_TEMP/trivy"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o "$RUNNER_TEMP/trivy/trivy.tar.gz"
          tar -xzf "$RUNNER_TEMP/trivy/trivy.tar.gz" -C "$RUNNER_TEMP/trivy"
          chmod +x "$RUNNER_TEMP/trivy/trivy"
          echo "$RUNNER_TEMP/trivy" >> "$GITHUB_PATH"

      - name: Run Trivy
        run: npm run security:trivy:check
        working-directory: demo

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/gitleaks"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "$RUNNER_TEMP/gitleaks/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks/gitleaks.tar.gz" -C "$RUNNER_TEMP/gitleaks"
          chmod +x "$RUNNER_TEMP/gitleaks/gitleaks"
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: Initialize report
        run: |
          mkdir -p "$(dirname "$GITLEAKS_REPORT_PATH")"
          printf "[]" > "$GITLEAKS_REPORT_PATH"

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: gitleaks git --config .gitleaks.toml --verbose --redact --exit-code 1 --report-format json --report-path "$GITLEAKS_REPORT_PATH" .

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: ${{ env.GITLEAKS_REPORT_PATH }}
          if-no-files-found: error

      - name: Enforce Gitleaks result
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outcome }}" = "failure" ]; then
            echo "Gitleaks detected leaks."
            exit 1
          fi

  semgrep:
    name: Semgrep
    if: ${{ vars.ENABLE_SECURITY_SEMGREP == 'true' }}
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Semgrep CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      - name: Run Semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          SEMGREP_CI_TIMEOUT_SECONDS: '900'
        run: npm run security:semgrep:check
        working-directory: demo
