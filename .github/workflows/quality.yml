name: Quality

on:
  pull_request:
    branches:
      - main
    paths:
      - demo/**
      - .github/workflows/quality.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  OSV_SCANNER_VERSION: 2.3.8

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: demo

      - name: Run format check
        run: pnpm run quality:format:check:all
        working-directory: demo

  lint-check:
    name: Lint Check
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: demo

      - name: Run lint check
        run: pnpm run quality:lint:check:all
        working-directory: demo

  type-check:
    name: Type Check
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: demo

      - name: Run type checks
        run: pnpm run quality:type:all
        working-directory: demo

  build:
    name: Build
    runs-on: ubuntu-slim
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: demo

      - name: Run build
        run: pnpm run build
        working-directory: demo

  osv-check:
    name: OSV Check
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: demo

      - name: Install OSV-Scanner
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" -o "$RUNNER_TEMP/osv-scanner"
          chmod +x "$RUNNER_TEMP/osv-scanner"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Run OSV check
        run: pnpm run quality:osv:check
        working-directory: demo
