name: Tests / Long

on:
  pull_request:
    branches:
      - main
    paths:
      - demo/**
      - .github/actions/setup-l2/**
      - .github/workflows/tests-long.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-long-${{ github.ref }}
  cancel-in-progress: true

jobs:
  long-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-slim
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Node Coverage Tests
            timeout_minutes: 40
            command: pnpm run test:unit:coverage:node
          - name: SDK Coverage Tests
            timeout_minutes: 40
            command: pnpm run test:unit:coverage:sdk
          - name: TS Coverage Tests
            timeout_minutes: 40
            command: pnpm run test:unit:coverage:ts
          - name: E2E Tests
            timeout_minutes: 60
            command: pnpm run test:e2e:all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup demo workspace
        uses: ./.github/actions/setup-l2

      - name: Run test suite
        run: ${{ matrix.command }}
        working-directory: demo
