name: Tests / XLong

on:
  pull_request:
    branches:
      - main
    paths:
      - demo/**
      - .github/actions/setup-l2/**
      - .github/workflows/tests-xlong.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-xlong-${{ github.ref }}
  cancel-in-progress: true

jobs:
  xlong-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-slim
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Node Integration Tests
            timeout_minutes: 45
            command: pnpm run test:integration:node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup l2 workspace
        uses: ./.github/actions/setup-l2

      - name: Run test suite
        run: ${{ matrix.command }}
        working-directory: demo
